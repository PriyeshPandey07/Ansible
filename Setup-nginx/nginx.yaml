- name: Setup Nginx with Custom File
  hosts: servers
  become: yes

  tasks:
    - name: Install Nginx
      package: 
        name: nginx
        state: latest

    - name: Start Nginx
      systemd_service:
        name: nginx
        state: started

    - name: Enable Nginx
      systemd_service:
        name: nginx
        enabled: true 

    - name: Copy the custom HTML File
      copy:
        src: /home/ubuntu/website/
        dest: /var/www/html/

    - name: Restart Nginx
      service:
        name: nginx
        state: reloaded

