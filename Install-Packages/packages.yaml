- name: Install package
  hosts: servers
  become: yes

  vars:
    packages_to_install:
       - tree
       - zip
       - unzip
       - jq
       - apache2
  tasks:
    - name: Install package
      apt:
        name: "{{ item }}"
        state: present
      loop: "{{ packages_to_install }}"
      when: ansible_facts["distribution"] == "Ubuntu"
    - name: Show messages
      loop: "{{ packages_to_install }}"
      debug:
        msg: "Installing {{ item }}"
      when: ansible_facts["distribution"] == "Ubuntu"
